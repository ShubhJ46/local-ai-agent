name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      # Report every version rather than stopping at the first failure, so a
      # version-specific problem is visible instead of masking the others.
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    name: python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest
